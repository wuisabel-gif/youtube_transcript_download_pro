<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
    }
    h1 { font-size: 14px; margin: 0 0 2px; }
    .sub { color: #aaa; font-size: 11px; margin: 0 0 14px; }
    .title {
      font-size: 12px; color: #ddd; margin: 0 0 14px;
      max-height: 34px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    label { display: block; font-size: 11px; color: #aaa; margin: 10px 0 4px; }
    select {
      width: 100%; padding: 7px 8px; border-radius: 8px;
      background: #1f1f1f; color: #f1f1f1; border: 1px solid #333; font-size: 13px;
    }
    .row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .row input { accent-color: #ff4e45; }
    button {
      width: 100%; margin-top: 16px; padding: 9px 12px; border: 0; border-radius: 9px;
      background: #ff4e45; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:disabled { background: #5a2c2a; color: #bbb; cursor: default; }
    .status { margin-top: 12px; font-size: 11px; color: #aaa; min-height: 14px; }
    .status.err { color: #ff7b72; }
    .status.ok { color: #7ee787; }
    code { background: #1f1f1f; padding: 1px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>TubeScribe</h1>
  <p class="sub">Download this video's transcript</p>

  <p class="title" id="title">Open a YouTube video…</p>

  <label for="lang">Language</label>
  <select id="lang" disabled><option>—</option></select>

  <label for="fmt">Format</label>
  <select id="fmt">
    <option value="txt">txt — plain text</option>
    <option value="srt">srt — subtitles</option>
    <option value="vtt">vtt — WebVTT</option>
    <option value="json">json — structured</option>
  </select>

  <div class="row">
    <input type="checkbox" id="ts" />
    <label for="ts" style="margin:0; color:#ddd;">Include timestamps (txt only)</label>
  </div>

  <button id="dl" disabled>Download</button>
  <div class="status" id="status">Loading…</div>

  <script src="popup.js"></script>
</body>
</html>
